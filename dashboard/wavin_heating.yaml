# Wavin AHC 9000 — Underfloor Heating Dashboard
#
# How to use:
#   Settings → Dashboards → Add Dashboard → give it a name
#   Open it → ⋮ (3-dot menu) → Edit Dashboard → ⋮ → Raw Configuration Editor
#   Paste this file's content and click Save.
#
# Thermostat names are taken directly from the entity — rename zones in
#   Settings → Integrations → Wavin AHC 9000 → Configure and the cards update.

title: Underfloor Heating
views:
  - title: Heating
    path: heating
    icon: mdi:radiator
    type: panel
    cards:
      - type: horizontal-stack
        cards:

          # ── Thermostat 1 (channels 0–5) ───────────────────────────────────
          - type: vertical-stack
            cards:
              - type: thermostat
                entity: climate.wavin_ahc_9000_zone_1
                min_temp: 0
                max_temp: 100
              - type: entities
                entities:
                  - entity: binary_sensor.wavin_ahc_9000_zone_1_heating
                    name: Heating active
                    icon: mdi:valve
                  - entity: sensor.wavin_ahc_9000_zone_1_air_temperature
                    name: Air temperature
                  - entity: number.wavin_ahc_9000_zone_1_comfort_temperature
                    name: Comfort limit
                  - entity: number.wavin_ahc_9000_zone_1_eco_temperature
                    name: Eco limit

          # ── Thermostat 2 (channels 6–10) ──────────────────────────────────
          - type: vertical-stack
            cards:
              - type: thermostat
                entity: climate.wavin_ahc_9000_zone_7
                min_temp: 0
                max_temp: 100
              - type: entities
                entities:
                  - entity: binary_sensor.wavin_ahc_9000_zone_7_heating
                    name: Heating active
                    icon: mdi:valve
                  - entity: sensor.wavin_ahc_9000_zone_7_air_temperature
                    name: Air temperature
                  - entity: number.wavin_ahc_9000_zone_7_comfort_temperature
                    name: Comfort limit
                  - entity: number.wavin_ahc_9000_zone_7_eco_temperature
                    name: Eco limit

          # ── Thermostat 3 (channels 12–15) ─────────────────────────────────
          - type: vertical-stack
            cards:
              - type: thermostat
                entity: climate.wavin_ahc_9000_zone_13
                min_temp: 0
                max_temp: 100
              - type: entities
                entities:
                  - entity: binary_sensor.wavin_ahc_9000_zone_13_heating
                    name: Heating active
                    icon: mdi:valve
                  - entity: sensor.wavin_ahc_9000_zone_13_air_temperature
                    name: Air temperature
                  - entity: number.wavin_ahc_9000_zone_13_comfort_temperature
                    name: Comfort limit
                  - entity: number.wavin_ahc_9000_zone_13_eco_temperature
                    name: Eco limit
